services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-happie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-happie}
      POSTGRES_DB: ${POSTGRES_DB:-happie}
    ports:
      - "0.0.0.0:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-happie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-happie}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      mc mb -p local/$${R2_BUCKET:-happie} || true;
      exit 0;
      "

  happie-api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://happie:happie@postgres:5432/happie}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-happie}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:18080}
      MAX_IMPORT_FILE_SIZE_MB: 2048
      OPTIMIZED_VIDEO_PRESET: ${OPTIMIZED_VIDEO_PRESET:-medium}
      RUST_LOG: info
    ports:
      - "0.0.0.0:18080:8080"

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    depends_on:
      - happie-api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    ports:
      - "0.0.0.0:5500:3000"
    volumes:
      - ./apps/admin-web:/app/apps/admin-web
      - admin-node-modules:/app/apps/admin-web/node_modules

  import-worker:
    build:
      context: .
      dockerfile: apps/import-worker/Dockerfile
    depends_on:
      - happie-api
      - minio-init
    environment:
      PUBLIC_API_BASE_URL: http://happie-api:8080
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-happie}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      MAX_IMPORT_FILE_SIZE_MB: 2048
      MAX_CONCURRENT_IMPORTS: ${MAX_CONCURRENT_IMPORTS:-2}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-4}
      OPTIMIZED_VIDEO_PRESET: ${OPTIMIZED_VIDEO_PRESET:-medium}
    volumes:
      - ./apps/import-worker:/app/apps/import-worker
      - worker-node-modules:/app/apps/import-worker/node_modules

volumes:
  postgres-data:
  minio-data:
  admin-node-modules:
  worker-node-modules:
