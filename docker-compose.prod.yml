# Homelab deployment: pulls prebuilt images from GHCR instead of building.
# Watchtower polls the registry and restarts services on new :latest images.
#
#   docker compose -f docker-compose.prod.yml up -d
#
# If the GitHub repo is private, log in once so pulls (and Watchtower polls) work:
#   docker login ghcr.io -u <github-user> -p <read:packages PAT>
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-happie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-happie}
      POSTGRES_DB: ${POSTGRES_DB:-happie}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-happie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "0.0.0.0:${MINIO_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-happie}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      mc mb -p local/$${R2_BUCKET:-happie} || true;
      exit 0;
      "

  happie-api:
    image: ghcr.io/jusso-dev/happie-api:latest
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-happie}:${POSTGRES_PASSWORD:-happie}@postgres:5432/${POSTGRES_DB:-happie}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-happie}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:18080}
      MAX_IMPORT_FILE_SIZE_MB: ${MAX_IMPORT_FILE_SIZE_MB:-2048}
      OPTIMIZED_VIDEO_MAX_HEIGHT: ${OPTIMIZED_VIDEO_MAX_HEIGHT:-720}
      OPTIMIZED_VIDEO_CRF: ${OPTIMIZED_VIDEO_CRF:-26}
      OPTIMIZED_VIDEO_PRESET: ${OPTIMIZED_VIDEO_PRESET:-medium}
      OPTIMIZED_AUDIO_BITRATE: ${OPTIMIZED_AUDIO_BITRATE:-96k}
      RUST_LOG: info
    ports:
      - "0.0.0.0:18080:8080"

  admin-web:
    image: ghcr.io/jusso-dev/happie-admin-web:latest
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - happie-api
    ports:
      - "0.0.0.0:5500:3000"

  import-worker:
    image: ghcr.io/jusso-dev/happie-import-worker:latest
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - happie-api
      - minio-init
    environment:
      PUBLIC_API_BASE_URL: http://happie-api:8080
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-happie}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      MAX_IMPORT_FILE_SIZE_MB: ${MAX_IMPORT_FILE_SIZE_MB:-2048}
      MAX_CONCURRENT_IMPORTS: ${MAX_CONCURRENT_IMPORTS:-2}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-4}
      OPTIMIZED_VIDEO_MAX_HEIGHT: ${OPTIMIZED_VIDEO_MAX_HEIGHT:-720}
      OPTIMIZED_VIDEO_CRF: ${OPTIMIZED_VIDEO_CRF:-26}
      OPTIMIZED_VIDEO_PRESET: ${OPTIMIZED_VIDEO_PRESET:-medium}
      OPTIMIZED_AUDIO_BITRATE: ${OPTIMIZED_AUDIO_BITRATE:-96k}
      NODE_OPTIONS: ${IMPORT_WORKER_NODE_OPTIONS:-}

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Reuse the host's registry login for private GHCR pulls.
      - ${DOCKER_CONFIG_JSON:-~/.docker/config.json}:/config.json:ro
    command: --label-enable --cleanup --interval ${WATCHTOWER_INTERVAL_SECONDS:-300}

volumes:
  postgres-data:
  minio-data:
